[[rules]]
name = "InterestingSshDir"
scope = "DirectoryEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".ssh"]
action = "Snaffle"
triage = "Red"
description = "SSH configuration directory -- likely contains private keys"

