[[rules]]
name = "CloudKeyPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    'AKIA[0-9A-Z]{16}',
    '(?i)aws_secret_access_key\s*[=:]\s*[A-Za-z0-9/+=]{40}',
    '(?i)aws_session_token\s*[=:]\s*[A-Za-z0-9/+=]{16,}',
    '(?i)private_key_id\s*[":]\s*[a-f0-9]{40}',
    "(?i)azure[_.]?(tenant|client|subscription)[_.]?id\\s*[=:]\\s*[\"']?[0-9a-f-]{36}",
    "(?i)client_secret\\s*[=:]\\s*[\"']?[A-Za-z0-9\\-._~]{32,}",
    '(?i)sk_live_[A-Za-z0-9]{24,}',
    'sk_test_[A-Za-z0-9]{24,}',
    'AIza[0-9A-Za-z_-]{35}',
    'dop_v1_[a-f0-9]{64}',
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)(example|sample|placeholder|your.?key|test.?key|dummy|CHANGE.?ME)',
    '(?i)AKIAIOSFODNN7EXAMPLE',
]
max_size = 1048576
context_bytes = 200
description = "Cloud provider credentials -- AWS keys, GCP private key IDs, Azure tokens"

[[rules]]
name = "GcpServiceAccountStructure"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = ["(?i)\"type\"\\s*:\\s*\"service_account\""]
action = "Snaffle"
triage = "Yellow"
max_size = 1048576
context_bytes = 200
description = "GCP service account JSON structure indicator"
