[[rules]]
name = "CredentialPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    "(?i)(password|passwd|pwd)\\s*[=:]\\s*[\"']?[^\\s\"']{4,}",
    "(?i)(api_?key|apikey|api_?secret)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
    "(?i)(secret_?key|access_?key)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
    "(?i)bearer\\s+[A-Za-z0-9\\-._~+/]+=*",
    "(?i)(auth_?token|access_?token|session_?token)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=\\-._]{16,}",
    "(?i)private_?key\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
]
action = "Snaffle"
triage = "Red"
max_size = 1048576
context_bytes = 200
description = "Credential patterns in file content -- passwords, API keys, tokens"
