[[rules]]
name = "CredentialPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    "(?i)(password|passwd|pwd)\\s*[=:]\\s*[\"']?[^\\s\"']{6,}",
    "(?i)(api_?key|apikey|api_?secret)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
    "(?i)(secret_?key|access_?key)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
    "(?i)bearer\\s+[A-Za-z0-9\\-._~+/]+=*",
    "(?i)(auth_?token|access_?token|session_?token)\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=\\-._]{16,}",
    "(?i)private_?key\\s*[=:]\\s*[\"']?[A-Za-z0-9/+=]{16,}",
    "(?i)[_.]pass\\s*[=:]\\s*[\"']?[^\\s\"']{4,}",
    "(?i)<(password|passwd|secret|apikey|token)>[^<]{4,}</",
    "(?i)(secret|credential)_?(key|token|value|password)\\s*[=:]\\s*[\"']?[^\\s\"']{6,}",
    "://[^:/?#\\s]+:[^@/?#\\s]{4,}@[^/?#\\s]+",
    "(?i)Authorization:\\s*Basic\\s+[A-Za-z0-9+/=]{8,}",
    "(?i)mysql\\b[^\\n]*\\s-p[\"']?[^\\s\"'-][^\\s\"']{3,}",
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    "(?i)[=:]\\s*[\"']?\\s*$",
    '(?i)(changeme|example|replace.?me|your.?password|xxx+|CHANGE.?ME|REPLACE.?ME|PLACEHOLDER|INSERT.?HERE|DUMMY|SAMPLE|FIXME|TODO|\bN/?A\b)',
    '\$\{',
    '\{\{',
    '<%[=%]?',
    '(?i)os\.environ|os\.getenv|process\.env\.|System\.getenv|ENV\[|env\(',
    "(?i)[=:]\\s*[\"']?(none|null|nil|undefined|true|false|empty)[\"']?\\s*$",
    "(?i)[=:]\\s*[\"']?\\*{3,}",
    '[=:]\s*<[a-zA-Z][^>]*>',
    '->(?:password|passwd|pwd|pass)\b',
    '(?i)(?:password|passwd|pwd)_?timeout\s*[=:]',

    # Shell command substitution / variable expansion as the value
    "(?i)(?:password|passwd|pwd|pass)[^=:]{0,20}[=:]\\s*[\"']?\\$\\(",
    "(?i)(?:password|passwd|pwd|pass)[^=:]{0,20}[=:]\\s*[\"']?\\$\\{",
    "(?i)(?:password|passwd|pwd|pass)[^=:]{0,20}[=:]\\s*[\"']?\\$[A-Za-z_][A-Za-z0-9_]*",

    # grep -P/-Po extraction expressions (Oracle RAC install scripts)
    '(?i)grep\s+-P?o?\b',

    # Log-line echoes: value is :-separated prose containing a var ref
    '(?i)(?:password|passwd|pwd|pass)\s*:\s*\$[A-Za-z_]',

    # tee -a $LOGFILE (script logging, not credential assignment)
    '(?i)\|\s*tee\s+-a\s+\$',

    # Message catalog format strings
    '(?i)(?:password|passwd|pwd|pass)[^=:\n]{0,40}\{[0-9]\}',
    '(?i)(?:password|passwd|pwd|pass)[^=:\n]{0,40}%[sd]',
]
exclude_file_paths = [
    # Oracle trace, message, and binary formats (defense-in-depth for custom rulesets)
    '(?i)\.(trc|trm|msg|bsq|plb|sbs|dbl)$',
    # Vendor documentation source formats
    '(?i)\.(pod|[1-9]|xsl|mk)$',
    # Perl runtime man pages under any install prefix
    '(?i)/perl/man/man[1-9]/',
    '(?i)/perl/lib/(?:site_perl|[0-9.]+)/',
    # Oracle message catalog and help directories
    '(?i)/(?:srvm|ldap|network)/(?:mesg|tools/help)/',
    # Oracle vendor install trees
    '(?i)/oracle\.ahf/',
    '(?i)/software_install/patches/',
    # Oracle APEX page exports (literal labels like 'passwd = confirm passwd')
    '(?i)/apex/',
    '(?i)f[0-9]{2,5}\.sql$',
    '(?i)/pages?/p[0-9]+\.sql$',
]
max_size = 1048576
context_bytes = 200
description = "Credential patterns in file content -- passwords, API keys, tokens"
