[[rules]]
name = "CryptoPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    '-----BEGIN\s+(RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----',
    '-----BEGIN PGP PRIVATE KEY BLOCK-----',
    '-----BEGIN CERTIFICATE-----',
    'PuTTY-User-Key-File-[0-9]',
]
action = "Snaffle"
triage = "Red"
max_size = 1048576
context_bytes = 200
description = "Cryptographic material -- private key PEM headers, PGP private keys, certificates"
