[[rules]]
name = "NetworkCredentialPatterns"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    # Cisco IOS "enable secret/password" — require line-anchored config shape
    '(?im)^\s*enable\s+(?:secret|password)\s+(?:\d+\s+)?\S{4,}\s*$',

    # SNMP community string
    '(?im)^\s*snmp-server\s+community\s+\S+',

    # username ... secret/password <N> <hash>
    '(?im)^\s*username\s+\S+\s+(?:secret|password)\s+\d+\s+\S{4,}\s*$',

    # JDBC URL (already well-formed)
    "(?i)jdbc:(mysql|postgresql|oracle|sqlserver|mariadb)://[^\\s\"']{10,}",
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_file_paths = [
    '(?i)\.(htm|html|pod|[1-9]|msg)$',
    '(?i)/help/',
    '(?i)/network/tools/help/',
]
max_size = 1048576
context_bytes = 200
description = "Network device credentials, SNMP community strings, JDBC connection strings"

[[rules]]
name = "SqlAccountCreation"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    '(?i)CREATE\s+(USER|LOGIN)\s+\S+',
    "(?i)IDENTIFIED\\s+BY\\s+['\"][^'\"]+['\"]",
    "(?i)WITH\\s+PASSWORD\\s*=\\s*['\"][^'\"]+['\"]",
]
action = "Snaffle"
triage = "Red"
skip_comments = true
exclude_patterns = [
    '(?i)no\s+authentication',
    '(?i)identified\s+(externally|globally)',
    '(?i)AUDIT\s+CREATE\s+USER',
    '(?i)logstdby\$skip_support',

    # IDENTIFIED BY with shell variable expansion
    "(?i)IDENTIFIED\\s+BY\\s+[\"']?\\$\\{",
    "(?i)IDENTIFIED\\s+BY\\s+[\"']?&&",          # SQL*Plus substitution variable
    "(?i)IDENTIFIED\\s+BY\\s+[\"']?:[A-Za-z_]",  # Bind variable

    # WITH PASSWORD = as shell expansion
    "(?i)WITH\\s+PASSWORD\\s*=\\s*[\"']?\\$\\{",

    # Oracle message catalog prose: "failed to create user..."
    '(?i)(?:failed|error|unable)\s+to\s+create\s+(?:user|login)',

    # Comment-header prose: "TO CREATE USER ..."
    '(?i)^\s*(?:\*|--|/\*|#|\*\*\*)[\*\s]*TO\s+CREATE',

    # Documentation references
    '(?i)(?:how|command|statement|syntax|used|example)\s+to\s+create\s+(?:user|login)',
]
exclude_file_paths = [
    # Oracle APEX page exports
    '(?i)/apex/',
    '(?i)f[0-9]{2,5}\.sql$',
    '(?i)/pages?/p[0-9]+\.sql$',

    # Oracle RDBMS catalog SQL
    '(?i)/rdbms/admin/c[0-9]+[a-z]*\.sql$',
    '(?i)/rdbms/admin/cat[a-z]+\.sql$',

    # Belt-and-suspenders for custom rulesets
    '(?i)\.(msg|htm|html|1|3|pod|trc)$',
]
max_size = 1048576
context_bytes = 200
description = "SQL account creation with embedded passwords"
