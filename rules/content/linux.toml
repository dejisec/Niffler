[[rules]]
name = "LinuxSecrets"
scope = "ContentsEnumeration"
match_location = "FileContentAsString"
match_type = "Regex"
patterns = [
    '\$[156y]\$[^\s:]{8,}',
    '(?i)(ALL\s*=\s*\(ALL\)|NOPASSWD)',
    '(?i)(mysql|postgres|root|admin):[^:]*:\d+:\d+:',
    '(?i)StrictHostKeyChecking\s+(no|accept-new)',
]
action = "Snaffle"
triage = "Red"
max_size = 1048576
context_bytes = 200
description = "Linux-specific secrets -- shadow hashes, sudoers directives, insecure SSH config"
