[[rules]]
name = "SshPrivateKeys"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["id_rsa", "id_ed25519", "id_ecdsa", "id_dsa"]
action = "Snaffle"
triage = "Black"
description = "SSH private key files"

[[rules]]
name = "KeePassDatabases"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["kdbx", "kdb"]
action = "Snaffle"
triage = "Black"
description = "KeePass password database files"

[[rules]]
name = "ShadowFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["shadow", "shadow-", "gshadow", "gshadow-", "master.passwd"]
action = "Snaffle"
triage = "Black"
description = "Unix password shadow files containing hashed credentials"

[[rules]]
name = "VaultTokenFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".vault-token"]
action = "Snaffle"
triage = "Black"
description = "HashiCorp Vault authentication tokens"

[[rules]]
name = "CloudCredentialPaths"
scope = "FileEnumeration"
match_location = "FilePath"
match_type = "Glob"
patterns = [
    "**/.aws/credentials",
    "**/.aws/config",
    "**/.gcp/*.json",
    "**/.azure/accessTokens.json",
    "**/.azure/azureProfile.json",
]
action = "Snaffle"
triage = "Black"
description = "Cloud provider credential files at well-known paths"

[[rules]]
name = "KubernetesConfigs"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["kubeconfig"]
action = "Snaffle"
triage = "Black"
description = "Kubernetes cluster configuration with embedded credentials"

[[rules]]
name = "KubernetesAdminConf"
scope = "FileEnumeration"
match_location = "FilePath"
match_type = "Glob"
patterns = [
    "**/kubernetes/admin.conf",
    "**/.kube/admin.conf",
]
action = "Snaffle"
triage = "Black"
description = "Kubernetes admin.conf at well-known k8s paths"

[[rules]]
name = "DiskImageExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["vmdk", "qcow2", "vdi", "vhd", "vhdx"]
action = "Snaffle"
triage = "Black"
description = "Virtual disk images -- may contain entire filesystems with credentials"

[[rules]]
name = "DatabaseFileExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["mdf", "ldf", "sqlite", "sqlite3", "db"]
action = "Snaffle"
triage = "Black"
description = "Database files that may contain stored credentials or sensitive data"

[[rules]]
name = "LuksKeyFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)luks.*key', '\.keyfile$']
action = "Snaffle"
triage = "Black"
description = "LUKS disk encryption key files"

[[rules]]
name = "PuttyKeys"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["ppk"]
action = "Snaffle"
triage = "Black"
description = "PuTTY SSH private key files"

[[rules]]
name = "PasswordManagerExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["psafe3", "kwallet"]
action = "Snaffle"
triage = "Black"
description = "Password Safe and KWallet database files"

[[rules]]
name = "NetworkDeviceConfigs"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["running-config", "startup-config"]
action = "Snaffle"
triage = "Black"
description = "Network device running/startup configurations with credentials"

[[rules]]
name = "WindowsHashFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)^(NTDS\.DIT|SAM|SYSTEM|SECURITY)$']
action = "Snaffle"
triage = "Black"
description = "Windows credential stores -- NTDS.DIT, SAM, SYSTEM, SECURITY hives"

[[rules]]
name = "MemoryDumpsBlack"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)^(lsass\.dmp|MEMORY\.DMP)$']
action = "Snaffle"
triage = "Black"
description = "High-value memory dumps containing credential material"

[[rules]]
name = "CyberArkPamFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [
    "Psmapp.cred", "backup.key", "VaultEmergency.pass",
    "CredFile", "Server.key",
]
action = "Snaffle"
triage = "Black"
description = "CyberArk PAM vault credential and key files"

[[rules]]
name = "DockerConfigPaths"
scope = "FileEnumeration"
match_location = "FilePath"
match_type = "Glob"
patterns = ["**/.docker/config.json"]
action = "Snaffle"
triage = "Black"
description = "Docker registry authentication config with embedded tokens"

[[rules]]
name = "PgpGpgExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["pgp", "gpg", "asc"]
action = "Relay"
relay_targets = ["CryptoPatterns"]
description = "PGP/GPG files -- relay to content scan for private key detection"
