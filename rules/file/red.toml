match_location = "FileExtension"
match_type = "Exact"
patterns = ["pl", "pm"]
action = "Relay"
relay_targets = ["CredentialPatterns", "TokenPatterns"]
description = "Perl source files"

[[rules]]
name = "LanguageRelayPhp"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["php"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "ConnectionStrings", "TokenPatterns"]
description = "PHP source files"

[[rules]]
name = "LanguageRelayJava"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["java"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings", "NetworkCredentialPatterns", "TokenPatterns"]
description = "Java source files"

[[rules]]
name = "LanguageRelayGo"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["go"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Go source files"

[[rules]]
name = "LanguageRelayRust"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["rs"]
action = "Relay"
relay_targets = ["CredentialPatterns", "TokenPatterns"]
description = "Rust source files"

[[rules]]
name = "LanguageRelayJs"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["js", "ts", "jsx", "tsx", "mjs"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "JavaScript and TypeScript source files"

[[rules]]
name = "NamedConfigRelay"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [
    "wp-config.php", "LocalSettings.php", "database.yml",
    "knife.rb", "settings.py", "application.properties",
]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings"]
description = "Well-known application config files likely to contain credentials"

[[rules]]
name = "VpnConfigFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["ovpn", "tblk"]
action = "Relay"
relay_targets = ["CredentialPatterns", "WireguardPrivateKey"]
description = "VPN configuration files -- may contain embedded credentials"

[[rules]]
name = "SqlFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["sql"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings", "SqlAccountCreation", "LinuxSecrets"]
description = "SQL files -- may contain credentials, connection strings, or password hashes"

[[rules]]
name = "PowerShellFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["ps1", "psm1", "psd1"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "PowerShell scripts -- may contain hardcoded credentials"

[[rules]]
name = "WindowsBatchFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["bat", "cmd"]
action = "Relay"
relay_targets = ["CredentialPatterns", "TokenPatterns"]
description = "Windows batch scripts -- may contain hardcoded credentials"

[[rules]]
name = "PackageManagerAuthFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".npmrc", ".pypirc", ".yarnrc", ".gemrc"]
action = "Relay"
relay_targets = ["CredentialPatterns", "TokenPatterns"]
description = "Package manager config files -- often contain auth tokens for private registries"

[[rules]]
name = "GenericSecretsFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)(secret|credential)s?\.(ya?ml|json|toml|xml|txt|conf|env)$']
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Files named secrets/credentials -- likely contain sensitive material"

[[rules]]
name = "ApplicationConfigFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = [
    '(?i)^appsettings(\.[a-z]+)?\.json$',
    '(?i)^application(-[a-z]+)?\.(ya?ml|properties)$',
    '(?i)^bootstrap\.(ya?ml|properties)$',
]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings"]
description = "Application framework config files -- Spring Boot, ASP.NET Core"

[[rules]]
name = "SshCustomKeyNames"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)(deploy|server|admin|bastion|prod|staging|github|gitlab|backup)[_-]key$']
action = "Snaffle"
triage = "Red"
description = "SSH private keys with custom names -- common in DevOps workflows"

[[rules]]
name = "GradleGroovyFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["gradle", "groovy"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Gradle and Groovy files -- may contain embedded credentials in build configs"

[[rules]]
name = "JavaPropertiesFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["properties"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings"]
description = "Java properties files -- commonly contain database and service credentials"

[[rules]]
name = "TemplateFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["j2", "jinja", "jinja2", "erb", "twig"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns"]
description = "Template files -- Ansible Jinja, Rails ERB, PHP Twig may embed credentials"
