[[rules]]
name = "EnvFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['\.env([._](local|dev|staging|prod|production|backup|test))?$']
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Environment variable files -- likely contain secrets"

[[rules]]
name = "EnvWordFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(^|[_\-])env([_.\-]|$)']
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns"]
description = "Files with 'env' as a word component -- may contain environment credentials"

[[rules]]
name = "ConfigSmallExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["ini", "cfg", "conf", "cnf", "config", "hcl"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings"]
description = "Configuration file extensions likely to contain credentials"

[[rules]]
name = "ConfigDataExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["yaml", "yml", "json", "toml", "xml"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings"]
description = "Structured data formats that may contain credentials"

[[rules]]
name = "ShellScriptExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["sh", "bash", "zsh", "ksh", "csh"]
action = "Relay"
relay_targets = ["CredentialPatterns", "TokenPatterns"]
description = "Shell scripts -- may contain hardcoded credentials"

[[rules]]
name = "PythonFiles"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["py"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Python files -- may contain hardcoded API keys and credentials"

[[rules]]
name = "DockerFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['^[Dd]ockerfile', '^docker-compose']
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Docker configuration files -- may contain embedded secrets"

[[rules]]
name = "GitCredentialFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".gitconfig", ".git-credentials", ".netrc"]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Git and network credential files"

[[rules]]
name = "AnsibleFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)(playbook|inventory|vault|ansible).*\.(ya?ml|cfg|ini|txt)$']
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Ansible configuration and playbook files -- may contain vault passwords"

[[rules]]
name = "TerraformStateFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['\.tfstate(\.backup)?$', '\.tfvars$', '\.tf$']
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns"]
description = "Terraform state and variable files -- often contain cloud credentials"

[[rules]]
name = "BackupFileExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["bak", "old", "orig", "save", "swp", "sav"]
action = "Relay"
relay_targets = ["CredentialPatterns", "ConnectionStrings", "TokenPatterns"]
description = "Backup and swap files -- may be copies of config files with credentials"

[[rules]]
name = "HistoryFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [
    ".bash_history", ".zsh_history", ".sh_history",
    ".mysql_history", ".psql_history",
    ".python_history", ".node_repl_history",
    ".lesshst", ".viminfo",
]
action = "Snaffle"
triage = "Red"
description = "Shell and application command history -- may contain typed credentials"

[[rules]]
name = "CloudStorageCredFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".boto", ".s3cfg"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns"]
description = "Cloud storage credential files"

[[rules]]
name = "RcloneConfig"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".rclone.conf"]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Rclone configuration with embedded credentials"

[[rules]]
name = "AppCredentialPaths"
scope = "FileEnumeration"
match_location = "FilePath"
match_type = "Glob"
patterns = [
    "**/.gem/credentials",
    "**/.m2/settings.xml",
    "**/.gradle/gradle.properties",
]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Application credential files at well-known dotfile paths"

[[rules]]
name = "PasswordFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)passwords?\.(txt|docx?|xlsx?|csv)$']
action = "Snaffle"
triage = "Red"
description = "Common password list files"

[[rules]]
name = "VaultPasswordFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)vault[_-]?pass(word)?']
action = "Snaffle"
triage = "Red"
description = "Vault password files -- Ansible vault, HashiCorp vault password files"

[[rules]]
name = "WebAuthFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".htpasswd", ".htaccess"]
action = "Snaffle"
triage = "Red"
description = "Apache authentication and access control files"

[[rules]]
name = "DbCredentialFiles"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = [".pgpass", ".my.cnf", ".dbshell"]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Database client credential files"

[[rules]]
name = "CiCdCredentials"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["credentials.xml"]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Jenkins and CI/CD credential stores"

[[rules]]
name = "DeploymentConfigs"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Exact"
patterns = ["unattend.xml", "customsettings.ini", "sysprep.inf"]
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Windows deployment configuration files with embedded credentials"

[[rules]]
name = "PrivateKeyExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["key", "pem", "pfx", "p12"]
action = "Relay"
relay_targets = ["CryptoPrivateKeys"]
description = "Private key file extensions -- may contain key material"

[[rules]]
name = "CertificateOnlyExtensions"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["crt", "cer"]
action = "Snaffle"
triage = "Yellow"
description = "Certificate files -- public, informational only"

[[rules]]
name = "RemoteAccessConfigs"
scope = "FileEnumeration"
match_location = "FileName"
match_type = "Regex"
patterns = ['(?i)^(mobaxterm\.ini|confCons\.xml)$']
action = "Relay"
relay_targets = ["CredentialPatterns"]
description = "Remote access tool configuration files with stored credentials"

[[rules]]
name = "LanguageRelayRuby"
scope = "FileEnumeration"
match_location = "FileExtension"
match_type = "Exact"
patterns = ["rb"]
action = "Relay"
relay_targets = ["CredentialPatterns", "CloudKeyPatterns", "TokenPatterns"]
description = "Ruby source files"

[[rules]]
name = "LanguageRelayPerl"
